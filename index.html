<!DOCTYPE html>
<html ng-app="app">
    <head>

        <title>Ronan Flávio</title>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" type="text/css" href="bower_components/bootstrap/dist/css/bootstrap.min.css">
        <link rel="stylesheet" type="text/css" href="bower_components/angular-material/angular-material.min.css">
        <link rel="stylesheet" type="text/css" href="bower_components/Ionicons/css/ionicons.min.css">
        <link rel="stylesheet" type="text/css" href="vendor/material-design-icons/iconfont/material-icons.css">
        <link rel="stylesheet" type="text/css" href="assets/css/main.css">

    </head>
    <body ng-controller="MainController">

        <div layout="column" ng-cloak>
            <md-toolbar class="md-tall" layout="row" layout-align="center center">
                <div class="md-toolbar-tools">
                    <span flex></span>
                    <span flex layout="row" layout-align="center center">
                        <div class="image-cropper image-big">
                            <img src="assets/img/profile.jpg" class="pic-profile">
                        </div>
                    </span>
                    <span flex></span>
                </div>
            </md-toolbar>

            <div class="container">

                <div class="margin-top">
                    <md-card>
                        <md-card-title>
                            <md-card-title-text class="text-center">
                                <h3 class="md-headline">Ronan Flávio</h3>
                            </md-card-title-text>
                        </md-card-title>
                        <md-card-content>
                            <div layout="row">
                                <div flex>
                                    ...
                                </div>
                                <div flex>
                                    <md-list>
                                        <div layout="row" ng-repeat="attr in person.attr">
                                            <md-list-item>
                                                <div flex>{{attr.key}}:</div>
                                                <div flex>{{attr.value}}</div>
                                                <md-divider ng-if="!$last"></md-divider>
                                            </md-list-item>
                                        </div>
                                    </md-list>
                                </div>
                            </div>
                        </md-card-content>
                        <md-card-actions>
                        </md-card-actions>
                    </md-card>
                </div>

            </div>
        </div>

        <div class="floating-button">
            <md-fab-speed-dial
                ng-hide="false"
                md-direction="up"
                md-open="isOpen"
                class="md-scale md-fab-top-right"
                ng-class=""
                ng-mouseenter="isOpen=true"
                ng-mouseleave="isOpen=false">

                <md-fab-trigger>
                    <md-button class="md-fab md-primary">
                        <i class="material-icons">share</i>
                    </md-button>
                </md-fab-trigger>
                <md-fab-actions>
                    <md-button class="md-fab md-mini md-primary">
                        <i class="ion-social-facebook medium"></i>
                    </md-button>
                    <md-button class="md-fab md-mini md-primary">
                        <i class="ion-social-linkedin medium"></i>
                    </md-button>
                    <md-button class="md-fab md-mini md-primary">
                        <i class="ion-social-twitter medium"></i>
                    </md-button>
                </md-fab-actions>

            </md-fab-speed-dial>

        </div>

        <script src="bower_components/jquery/dist/jquery.min.js"></script>
        <script src="bower_components/bootstrap/dist/js/bootstrap.min.js"></script>

        <script src="bower_components/angular/angular.min.js"></script>
        <script src="bower_components/angular-animate/angular-animate.min.js"></script>
        <script src="bower_components/angular-aria/angular-aria.min.js"></script>
        <script src="bower_components/angular-material/angular-material.min.js"></script>
        <script src="bower_components/angular-messages/angular-messages.min.js"></script>
        <script src="bower_components/angular-route/angular-route.min.js"></script>
        <!-- Personal files -->
        <script src="assets/js/main.js"></script>
        <script src="angular_app/components/app.js"></script>

    </body>
</html>
